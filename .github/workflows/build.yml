name: Build CEF Wrapper

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y cmake ninja-build libgtk-3-dev libnss3 libasound2t64 libxss1

      - name: Download CEF
        run: |
          wget -q "https://cef-builds.spotifycdn.com/cef_binary_148.0.9+g0d9d52a+chromium-148.0.7778.180_linux64_minimal.tar.bz2" -O cef_linux.tar.bz2
          mkdir -p /tmp/cef/linux
          tar -xjf cef_linux.tar.bz2 -C /tmp/cef/linux --strip-components=1

      - name: Build project
        run: |
          mkdir -p native/build/linux
          cd native/build/linux
          cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCEF_ROOT=/tmp/cef/linux ../..
          cmake --build . --target cef_subprocess CefNative

      - name: Stage runtime (linux-x64)
        run: |
          mkdir -p native/stage/runtimes/linux-x64/native
          cp -a /tmp/cef/linux/Release/. native/stage/runtimes/linux-x64/native/
          cp -a /tmp/cef/linux/Resources/. native/stage/runtimes/linux-x64/native/
          cp -a native/build/linux/libCefNative.so native/stage/runtimes/linux-x64/native/
          cp -a native/build/linux/cef_subprocess native/stage/runtimes/linux-x64/native/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runtime-linux-x64
          path: native/stage/runtimes/linux-x64/native

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download CEF
        run: |
          Invoke-WebRequest "https://cef-builds.spotifycdn.com/cef_binary_148.0.9+g0d9d52a+chromium-148.0.7778.180_windows64_minimal.tar.bz2" -OutFile cef_windows.tar.bz2
          mkdir C:\cef\windows
          tar -xjf cef_windows.tar.bz2 -C C:\cef\windows --strip-components=1

      - name: Build project
        run: |
          mkdir -p native/build/windows
          cd native/build/windows
          cmake -DCMAKE_BUILD_TYPE=Release -DCEF_ROOT=C:/cef/windows ../..
          cmake --build . --target cef_subprocess CefNative --config Release

      - name: Stage runtime (win-x64)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force native\stage\runtimes\win-x64\native | Out-Null
          Copy-Item -Recurse -Force C:\cef\windows\Release\* native\stage\runtimes\win-x64\native\
          Copy-Item -Recurse -Force C:\cef\windows\Resources\* native\stage\runtimes\win-x64\native\
          Copy-Item -Force native\build\windows\Release\CefNative.dll native\stage\runtimes\win-x64\native\
          Copy-Item -Force native\build\windows\Release\cef_subprocess.exe native\stage\runtimes\win-x64\native\

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runtime-win-x64
          path: native/stage/runtimes/win-x64/native

  build-macos:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install cmake ninja wget

      - name: Download CEF
        run: |
          wget -q "https://cef-builds.spotifycdn.com/cef_binary_148.0.9+g0d9d52a+chromium-148.0.7778.180_macosx64_minimal.tar.bz2" -O cef_macos.tar.bz2
          mkdir -p /tmp/cef/macos
          tar -xjf cef_macos.tar.bz2 -C /tmp/cef/macos --strip-components=1

      - name: Build project
        run: |
          mkdir -p native/build/macos
          cd native/build/macos
          cmake -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCEF_ROOT=/tmp/cef/macos ../..
          cmake --build . --target cef_subprocess CefNative

      - name: Stage runtime (osx-x64)
        run: |
          mkdir -p native/stage/runtimes/osx-x64/native
          mkdir -p native/stage/buildTransitive/osx-x64

          cp -a native/build/macos/libCefNative.dylib native/stage/runtimes/osx-x64/native/
          cp -a native/build/macos/cef_subprocess native/stage/runtimes/osx-x64/native/

          # Zip the entire framework bundle so NuGet doesn't see individual .lproj files
          ditto -c -k --keepParent "/tmp/cef/macos/Release/Chromium Embedded Framework.framework" \
            native/stage/buildTransitive/osx-x64/cef_framework.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: runtime-osx-x64
          path: native/stage/runtimes/osx-x64/native

      - name: Upload macos transitive assets
        uses: actions/upload-artifact@v4
        with:
          name: buildtransitive-osx-x64
          path: native/stage/buildTransitive/osx-x64

  pack-nuget:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
        - uses: actions/checkout@v4

        - name: Setup .NET
          uses: actions/setup-dotnet@v4
          with:
            dotnet-version: '10.0.x'

        - name: Download linux runtime
          uses: actions/download-artifact@v4
          with:
            name: runtime-linux-x64
            path: native/stage/runtimes/linux-x64/native

        - name: Download windows runtime
          uses: actions/download-artifact@v4
          with:
            name: runtime-win-x64
            path: native/stage/runtimes/win-x64/native

        - name: Download macos runtime
          uses: actions/download-artifact@v4
          with:
            name: runtime-osx-x64
            path: native/stage/runtimes/osx-x64/native

        - name: Download macos transitive assets
          uses: actions/download-artifact@v4
          with:
            name: buildtransitive-osx-x64
            path: native/stage/buildTransitive/osx-x64

        - name: Pack NuGet
          run: |
            cd dotnet/CefNative
            dotnet pack -c Release -o ../../artifacts /p:Version=1.0.${{ github.run_number }}

        - name: Publish to GitHub Packages
          run: |
            dotnet nuget push artifacts/*.nupkg \
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
              --api-key "${{ secrets.GITHUB_TOKEN }}" \
              --skip-duplicate

        - name: Upload NuGet artifact
          uses: actions/upload-artifact@v4
          with:
            name: nuget-package
            path: artifacts/*.nupkg